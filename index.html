<!DOCTYPE html>
<html lang="es">

        tailwind.config = {
            theme: {
                extend: {

                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {

                            800: '#0a212d',
                            dark: '#08161f',
                        },
                        botanical: {
                            50: '#f0f9f4',
                            100: '#dcf2e3',
                            500: '#3e9c64', // Verde hoja del logo
                            600: '#2a7044', // Verde profundo para textos
                            800: '#1b4a2c',
                        },
                        earth: {
                            50: '#faf6f3',
                            100: '#f3e8df',
                            500: '#8c583c', // Tono arcilla/tierra del Magdalena
                            600: '#75472e', // Tierra profundo para contrastes y realces
                            700: '#5c3821',
                        },
                        accent: {
                            100: '#e0f2f1',
                            500: '#0f968c', // Aguamarina de red del logo
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html {
            scroll-behavior: smooth;
        }
        .bg-terra-botanica {
            background: linear-gradient(135deg, rgba(243,232,223,0.3) 0%, rgba(244,248,246,0.5) 50%, rgba(220,242,227,0.3) 100%);
        }
        .enhanced-logo {
            filter: contrast(1.04) saturate(1.03) brightness(1.02);
        }
    </style>
</head>
<body class="bg-[#fcfaf7] text-stone-800 font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Base de datos de textos por defecto
        const DEFAULT_CONTENT = {
            heroTitle: "Biotecnología de Precisión para el Retorno Vascular",
            heroSubtitle: "Transformamos la riqueza fitoquímica del departamento del Magdalena en soluciones biológicas de alta absorción para aliviar la insuficiencia venosa y regenerar tu vitalidad celular.",
            
            aboutTitle: "El Poder de la Etnobotánica Científica",
            aboutText: "Diseñamos fitoterapéuticos de precisión enfocados en el bienestar endotelial. Validamos la sinergia de especies botánicas nativas para el tratamiento complementario de la insuficiencia venosa, reduciendo la dependencia de químicos sintéticos a través de un formato galénico tradicional de píldoras de miel.",
            
            highlight1Title: "Rescate y Soberanía Local",
            highlight1Desc: "Utilizamos biotipos del Magdalena con alta densidad de principios activos, valorizando el conocimiento ancestral de la Sierra Nevada.",
            
            highlight2Title: "Sinergia del 2,000% de Absorción",
            highlight2Desc: "Al fusionar Cúrcuma con Piperina (Pimienta Negra), multiplicamos exponencialmente la absorción de los curcuminoides protectores.",
            
            highlight3Title: "Matriz Activa de Miel de Abejas",
            highlight3Desc: "Aglutinamos a Punto de Hebra (110°C - 115°C) creando un conservante natural biológico con sistema de liberación controlada.",
            
            productsTitle: "Nuestras Fórmulas de Precisión",
            productsText: "Estandarizamos la dosificación artesanal en formatos altamente asimilables. Nuestras píldoras y esferas de miel de 500mg a 1000mg preservan los aceites esenciales sin necesidad de excipientes sintéticos.",
            
            bioTitle: "Innovación y Tradición de la mano de Antony",
            bioText: "Soy Antony Racines Tapia, apasionado por la bioprospección y la soberanía sanitaria. Mi propósito es validar científicamente la riqueza vegetal de nuestra región para desarrollar alternativas terapéuticas de máxima pureza, creando alianzas con la academia y el Herbario UTMC de la Universidad del Magdalena."
        };

        // Base de datos de imágenes por defecto con sus fallbacks estéticos
        const DEFAULT_IMAGES = {
            logo: "image_6c44d8.jpg",
            hero: "image_76b1c4.jpg",
            prontoalivio: "Pronto Alivio.jpeg",
            curcuma: "Curcuma.jpeg",
            ortiga: "Ortiga.jpeg",
            pimienta: "Pimienta negra.jpeg",
            miel: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?auto=format&fit=crop&q=80&w=600",
            pastillas: "image_76b339.jpg",
            antony: "" // Espacio para que cargues tu foto o uses el avatar por defecto
        };

        function App() {
            // Cargar datos locales de persistencia
            const [content, setContent] = useState(() => {
                const saved = localStorage.getItem('etno_content_v3');
                return saved ? JSON.parse(saved) : DEFAULT_CONTENT;
            });

            const [images, setImages] = useState(() => {
                const saved = localStorage.getItem('etno_images_v3');
                return saved ? JSON.parse(saved) : DEFAULT_IMAGES;
            });

            // Hemos pre-cargado tu URL real del Google Apps Script
            const [gasUrl, setGasUrl] = useState(() => {
                return localStorage.getItem('etno_gas_url_v3') || 'https://script.google.com/macros/s/AKfycbxunYDD0fHKch1eIiA0DCQ4wBOWmBUgsuzKSP0FyHWsTmwLt9f53XmoHIqfMeV-jo4/exec';
            });

            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [passcode, setPasscode] = useState('');
            const [editForm, setEditForm] = useState(content);
            const [editImages, setEditImages] = useState(images);
            const [toastMessage, setToastMessage] = useState('');
            const [activeFormula, setActiveFormula] = useState('prbv');
            const [isSubmitting, setIsSubmitting] = useState(false);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 4000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passcode === 'ETNO2026') {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setPasscode('');
                    showToast('¡Sesión Iniciada! Ahora puedes cambiar textos, subir fotos y descargar tu index.html.');
                } else {
                    showToast('Código incorrecto.');
                }
            };

            // Conversor de enlaces para Google Drive para hacerlos de acceso directo
            const convertDriveLink = (url) => {
                if (!url) return '';
                const regExp = /\/file\/d\/([^\/]+)/;
                const match = url.match(regExp);
                if (match && match[1]) {
                    return `https://lh3.googleusercontent.com/d/${match[1]}=s1000`;
                }
                return url;
            };

            const handleImageChange = (key, val) => {
                let finalVal = convertDriveLink(val);
                setEditImages(prev => ({ ...prev, [key]: finalVal }));
            };

            // Lector de archivos local para convertir imágenes cargadas de tu PC a base64
            const handleFileUpload = (key, e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.size > 2 * 1024 * 1024) {
                    showToast('La imagen es muy pesada. Intenta que pese menos de 2MB.');
                    return;
                }

                const reader = new FileReader();
                reader.onloadend = () => {
                    setEditImages(prev => ({ ...prev, [key]: reader.result }));
                    showToast('Imagen procesada localmente con éxito.');
                };
                reader.readAsDataURL(file);
            };

            const handleSaveAll = (e) => {
                e.preventDefault();
                setContent(editForm);
                setImages(editImages);
                localStorage.setItem('etno_content_v3', JSON.stringify(editForm));
                localStorage.setItem('etno_images_v3', JSON.stringify(editImages));
                localStorage.setItem('etno_gas_url_v3', gasUrl);
                setShowEditModal(false);
                showToast('¡Cambios aplicados localmente!');
            };

            // Exportación unificada en un solo archivo index.html listo para subir a GitHub
            const exportHTML = () => {
                const currentHTML = document.documentElement.outerHTML;
                
                let updatedHTML = currentHTML;
                const contentRegex = /const DEFAULT_CONTENT = \{[\s\S]*?\};/;
                updatedHTML = updatedHTML.replace(contentRegex, `const DEFAULT_CONTENT = ${JSON.stringify(editForm, null, 4)};`);
                
                const imagesRegex = /const DEFAULT_IMAGES = \{[\s\S]*?\};/;
                updatedHTML = updatedHTML.replace(imagesRegex, `const DEFAULT_IMAGES = ${JSON.stringify(editImages, null, 4)};`);
                
                const gasRegex = /return localStorage\.getItem\('etno_gas_url_v3'\) \|\| '[^']*';/;
                updatedHTML = updatedHTML.replace(gasRegex, `return localStorage.getItem('etno_gas_url_v3') || ${JSON.stringify(gasUrl)};`);

                const blob = new Blob([`<!DOCTYPE html>\n<html lang="es">\n` + updatedHTML + `\n</html>`], { type: 'text/html' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'index.html';
                link.click();
                showToast('¡Archivo index.html descargado! Súbelo a tu repositorio de GitHub Pages.');
            };

            const handleContactSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);

                const formData = {
                    nombre: e.target.nombre.value,
                    correo: e.target.correo.value,
                    interes: e.target.interes.value,
                    mensaje: e.target.mensaje.value,
                    fecha: new Date().toLocaleString()
                };

                if (gasUrl) {
                    try {
                        showToast('Enviando datos a tu Google Sheet...');
                        await fetch(gasUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(formData)
                        });
                        showToast('¡Listo! Registro exitoso y correo de confirmación despachado.');
                        e.target.reset();
                    } catch (err) {
                        showToast('Registro guardado localmente. Verifica el enlace de Google Script.');
                    }
                } else {
                    showToast('¡Registro guardado en memoria! Vincula tu Google Script para recibir notificaciones.');
                    e.target.reset();
                }
                setIsSubmitting(false);
            };

            const plantProfiles = [
                {
                    key: "prontoalivio",
                    name: "Prontoalivio (Sanalotodo)",
                    scientific: "Lippia alba (Familia Verbenácea)",
                    class: "Magnoliopsida",
                    desc: "Arbusto aromático medicinal valorado por sus propiedades antiinflamatorias, digestivas y sedantes. Crece con flores lilas o púrpuras en patios y laderas del departamento.",
                    benefits: [
                        "Modulador único del tono vascular, inexistente en el mercado convencional.",
                        "Efecto analgésico y venotónico de alto rendimiento periférico.",
                        "Acción antiespasmódica frente al cansancio y dolores circulatorios."
                    ],
                    location: "Laderas del departamento del Magdalena y cultivada en jardines caseros tradicionales.",
                    highlight: "Biotipo local con altísima concentración de aceites esenciales puros.",
                    image: images.prontoalivio || "Pronto Alivio.jpeg"
                },
                {
                    key: "curcuma",
                    name: "Cúrcuma Dorada",
                    scientific: "Cúrcuma longa (Familia Zingiberáceas)",
                    class: "Liliopsida",
                    desc: "Planta herbácea perenne con rizomas de un color naranja profundo. La curcumina contenida actúa directamente desinflamando el endotelio vascular y reduciendo placa.",
                    benefits: [
                        "Antiinflamatorio natural: reduce inflamación endotelial de forma potente.",
                        "Protector metabólico: ayuda a gestionar los lípidos en sangre y el colesterol.",
                        "Investigada por su capacidad de aumentar la regeneración de tejidos."
                    ],
                    location: "Suelos de climas tropicales de la Zona Bananera y estribaciones de la Sierra Nevada.",
                    highlight: "Su rizoma es el pilar antioxidante y protector del sistema circulatorio.",
                    image: images.curcuma || "Curcuma.jpeg"
                },
                {
                    key: "ortiga",
                    name: "Ortiga Mayor",
                    scientific: "Urtica dioica (Familia Urticáceas)",
                    class: "Magnoliopsida",
                    desc: "Planta de gran reconocimiento científico debido a su alta concentración de compuestos bioactivos y minerales estructurales.",
                    benefits: [
                        "Aporta re-mineralización y firmeza a las paredes venosas débiles.",
                        "Acción antiinflamatoria sistémica para reducir el dolor en extremidades.",
                        "Combate la fatiga y pesadez en personas con insuficiencia venosa crónica."
                    ],
                    location: "Zonas medias y boscosas de la Sierra Nevada de Santa Marta.",
                    highlight: "El soporte de ingeniería estructural indispensable para evitar la hinchazón.",
                    image: images.ortiga || "Ortiga.jpeg"
                },
                {
                    key: "pimienta",
                    name: "Pimienta Negra (Catalizador)",
                    scientific: "Piper nigrum (Familia Piperáceas)",
                    class: "Magnoliopsida",
                    desc: "Reina de las especias. Planta trepadora esencial por actuar como un bio-potenciador de asimilación del resto de componentes.",
                    benefits: [
                        "Inhibe de forma segura enzimas que destruyen los fitofármacos en el tracto digestivo.",
                        "Aumenta la biodisponibilidad de los curcuminoides protectores en un 2,000%.",
                        "Estimulante digestivo natural y acelerador del metabolismo celular."
                    ],
                    location: "Cultivada en ambientes cálidos y húmedos de la región caribeña.",
                    highlight: "La llave biológica: sin ella la curcumina es eliminada sin entrar a la vena.",
                    image: images.pimienta || "Pimienta negra.jpeg"
                },
                {
                    key: "miel",
                    name: "Miel de Abejas Pura (Vehículo)",
                    scientific: "Apis mellifera (Sustancia Biológica)",
                    class: "Matriz Activa",
                    desc: "Complejo biológico sobresaturado de azúcares con más de 200 compuestos activos cicatrizantes y protectores.",
                    benefits: [
                        "Preparada a Punto de Hebra (110°C - 115°C) para estabilización microbiológica.",
                        "Actúa como un agente conservador natural que previene la oxidación de terpenos.",
                        "Sistema de liberación controlada que evita el uso de estabilizantes artificiales."
                    ],
                    location: "Bosques secos y apiarios del departamento del Magdalena.",
                    highlight: "Vehículo terapéutico tradicional que garantiza la frescura de la píldora.",
                    image: images.miel
                }
            ];

            return (
                <div className="min-h-screen bg-terra-botanica flex flex-col justify-between">
                    
                    {/* ENCABEZADO */}
                    <header className="fixed top-0 w-full bg-white/90 backdrop-blur-md z-40 border-b border-earth-100 shadow-sm">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="relative w-12 h-12 bg-white rounded-xl shadow-md border border-stone-200 flex items-center justify-center overflow-hidden p-0.5 group">
                                    <img 
                                        src={images.logo || "image_6c44d8.jpg"} 
                                        alt="Etnobotánica Logo" 
                                        className="w-full h-full object-contain enhanced-logo group-hover:scale-105 transition-transform duration-300"
                                        onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&q=80&w=100"; }}
                                    />
                                </div>
                                <span className="text-xl font-serif font-black text-brand-700 tracking-tight">etnobotánica</span>
                            </div>
                            <nav className="hidden md:flex gap-8 font-semibold text-stone-600">
                                <a href="#proposito" className="hover:text-earth-600 transition-colors">La Propuesta</a>
                                <a href="#sinergia" className="hover:text-earth-600 transition-colors">Sinergia del 2,000%</a>
                                <a href="#plantas" className="hover:text-earth-600 transition-colors">Ingredientes</a>
                                <a href="#productos" className="hover:text-earth-600 transition-colors">Fórmulas</a>
                                <a href="#contacto" className="hover:text-earth-600 transition-colors">Aliados</a>
                            </nav>
                            
                            {isAdmin ? (
                                <button 
                                    onClick={() => setShowEditModal(true)}
                                    className="bg-earth-600 hover:bg-earth-700 text-white px-5 py-2.5 rounded-full font-bold flex items-center gap-2 shadow-lg shadow-earth-500/20 text-sm transition-all"
                                >
                                    🛠 Panel de Control
                                </button>
                            ) : (
                                <a href="#contacto" className="hidden sm:inline-block bg-earth-500 hover:bg-botanical-600 text-white px-6 py-2.5 rounded-full font-bold shadow-md hover:-translate-y-0.5 transition-all text-sm">
                                    Hacerse Socio
                                </a>
                            )}
                        </div>
                    </header>

                    {/* HERO */}
                    <section className="pt-36 pb-20 px-6 relative">
                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-botanical-100/30 rounded-full blur-[120px] -z-10 translate-x-1/3 -translate-y-1/3"></div>
                        <div className="absolute bottom-0 left-0 w-[400px] h-[400px] bg-earth-100/30 rounded-full blur-[100px] -z-10 -translate-x-1/3 translate-y-1/3"></div>

                        <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
                            <div className="space-y-6 relative z-10">
                                <div className="inline-flex items-center gap-2 px-4 py-2 bg-earth-100 text-earth-800 font-bold rounded-full text-xs uppercase tracking-wider border border-earth-100">
                                    <span className="w-2 h-2 rounded-full bg-botanical-500 animate-pulse"></span>
                                    Biotecnología & Sabiduría del Magdalena
                                </div>
                                <h1 className="text-4xl md:text-5xl lg:text-6xl font-serif font-black leading-tight text-brand-700">
                                    {content.heroTitle}
                                </h1>
                                <p className="text-lg text-stone-600 leading-relaxed">
                                    {content.heroSubtitle}
                                </p>
                                <div className="pt-4 flex flex-col sm:flex-row gap-4">
                                    <a href="#productos" className="bg-gradient-to-r from-earth-600 to-botanical-600 text-white px-8 py-4 rounded-full font-bold shadow-xl shadow-earth-500/20 hover:shadow-botanical-600/30 hover:-translate-y-0.5 transition-all text-center">
                                        Explorar Fórmulas ➔
                                    </a>
                                    <a href="#contacto" className="bg-white text-stone-800 border border-stone-200 px-8 py-4 rounded-full font-bold hover:bg-stone-50 hover:border-earth-300 transition-all text-center">
                                        Presentación Comercial
                                    </a>
                                </div>
                            </div>
                            
                            <div className="relative">
                                <div className="relative rounded-[2.5rem] overflow-hidden shadow-2xl shadow-earth-900/10 border-4 border-white aspect-[4/3] group">
                                    <img 
                                        src={images.hero || "image_76b1c4.jpg"} 
                                        alt="Cultivo de Prontoalivio" 
                                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                                        onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&q=80&w=800"; }}
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                                    <div className="absolute bottom-6 left-6 right-6 text-white flex items-center gap-4">
                                        <div className="w-14 h-14 rounded-xl bg-white/95 p-1 backdrop-blur shadow-lg flex items-center justify-center shrink-0">
                                            <img 
                                                src={images.logo || "image_6c44d8.jpg"} 
                                                alt="Etnobotánica Logo" 
                                                className="w-full h-full object-contain enhanced-logo" 
                                                onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&q=80&w=100"; }}
                                            />
                                        </div>
                                        <div>
                                            <p className="text-xs uppercase font-bold tracking-widest text-earth-100">Innovación Botánica</p>
                                            <h3 className="font-serif text-base md:text-lg font-bold">Biocomplejos de Precisión • Magdalena, Colombia</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* PROPOSITO */}
                    <section id="proposito" className="py-24 px-6 bg-white border-y border-stone-100">
                        <div className="max-w-6xl mx-auto">
                            <div className="grid lg:grid-cols-12 gap-12 items-center">
                                <div className="lg:col-span-5 space-y-6">
                                    <div className="w-14 h-14 bg-earth-50 text-earth-700 rounded-2xl flex items-center justify-center shadow-sm border border-earth-100">
                                        <img 
                                            src={images.logo || "image_6c44d8.jpg"} 
                                            alt="Logo Icon" 
                                            className="w-9 h-9 object-contain enhanced-logo" 
                                            onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&q=80&w=100"; }}
                                        />
                                    </div>
                                    <h2 className="text-3xl md:text-4xl font-serif font-bold text-brand-700 leading-tight">
                                        {content.aboutTitle}
                                    </h2>
                                    <p className="text-stone-600 leading-relaxed text-base">
                                        {content.aboutText}
                                    </p>
                                    <div className="pt-4 border-t border-stone-100 flex gap-6">
                                        <div>
                                            <h4 className="text-2xl font-bold text-botanical-600">100%</h4>
                                            <p className="text-xs text-stone-500 uppercase tracking-wider font-semibold">Libre de Aditivos</p>
                                        </div>
                                        <div className="border-l border-stone-200 pl-6">
                                            <h4 className="text-2xl font-bold text-earth-600">Sinergia</h4>
                                            <p className="text-xs text-stone-500 uppercase tracking-wider font-semibold">Fito-Biológica Real</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-7 grid sm:grid-cols-2 gap-6">
                                    <div className="p-8 rounded-3xl bg-earth-50 border border-earth-100 space-y-4">
                                        <h3 className="text-lg font-bold text-earth-700">💎 {content.highlight1Title}</h3>
                                        <p className="text-sm text-stone-600 leading-relaxed">
                                            {content.highlight1Desc}
                                        </p>
                                    </div>

                                    <div className="p-8 rounded-3xl bg-botanical-50 border border-botanical-100 space-y-4">
                                        <h3 className="text-lg font-bold text-botanical-800">🔬 {content.highlight2Title}</h3>
                                        <p className="text-sm text-stone-600 leading-relaxed">
                                            {content.highlight2Desc}
                                        </p>
                                    </div>

                                    <div className="p-8 rounded-3xl bg-[#f0fcfc] border border-accent-100 space-y-4 sm:col-span-2">
                                        <h3 className="text-lg font-bold text-accent-500">🍯 {content.highlight3Title}</h3>
                                        <p className="text-sm text-stone-600 leading-relaxed">
                                            {content.highlight3Desc}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SINERGIA EXPLICACIÓN */}

                                            placeholder="https://script.google.com/macros/s/.../exec" 
                                            className="w-full px-3 py-2 text-xs border rounded-lg focus:ring-2 focus:ring-earth-500 bg-white outline-none"
                                        />
                                    </div>

                                    {/* SECCIÓN CARGADORES DE IMÁGENES */}
                                    <div className="space-y-4">
                                        <h4 className="font-extrabold text-sm uppercase text-earth-750 tracking-wider bg-earth-100 p-3 rounded-xl">🖼 Panel de Gestión de Imágenes</h4>
                                        <p className="text-xs text-stone-500 leading-relaxed">
                                            Puedes pegar un enlace directo de internet, un enlace de compartir de Google Drive (se convertirá automáticamente) o arrastrar un archivo de imagen desde tu computadora (máx 2MB) para que se convierta en Base64 de forma local y permanente.
                                        </p>
                                        
                                        <div className="grid md:grid-cols-2 gap-6 pt-2">
                                            {/* LOGO */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Logo de Etnobotánica</span>
                                                    <span className="text-[10px] text-stone-400">Dimensión recomendada: Cuadrada</span>
                                                </div>
                                                <input type="text" value={editImages.logo} onChange={(e) => handleImageChange('logo', e.target.value)} placeholder="URL de la imagen" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('logo', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>

                                            {/* HERO MATERA */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Imagen Principal (Hero Matera)</span>
                                                    <span className="text-[10px] text-stone-400">Recomendado: Atardecer / Matera</span>
                                                </div>
                                                <input type="text" value={editImages.hero} onChange={(e) => handleImageChange('hero', e.target.value)} placeholder="URL de la imagen" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('hero', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>

                                            {/* PRONTOALIVIO */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Planta: Prontoalivio</span>
                                                    <span className="text-[10px] text-stone-400">Nombre de archivo original: Pronto Alivio.jpeg</span>
                                                </div>
                                                <input type="text" value={editImages.prontoalivio} onChange={(e) => handleImageChange('prontoalivio', e.target.value)} placeholder="URL de la imagen" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('prontoalivio', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>

                                            {/* CURCUMA */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Planta: Cúrcuma</span>
                                                    <span className="text-[10px] text-stone-400">Nombre de archivo original: Curcuma.jpeg</span>
                                                </div>
                                                <input type="text" value={editImages.curcuma} onChange={(e) => handleImageChange('curcuma', e.target.value)} placeholder="URL de la imagen" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('curcuma', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>

                                            {/* ORTIGA */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Planta: Ortiga</span>
                                                    <span className="text-[10px] text-stone-400">Nombre de archivo original: Ortiga.jpeg</span>
                                                </div>
                                                <input type="text" value={editImages.ortiga} onChange={(e) => handleImageChange('ortiga', e.target.value)} placeholder="URL de la imagen" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('ortiga', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>

                                            {/* PIMIENTA */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Planta: Pimienta Negra</span>
                                                    <span className="text-[10px] text-stone-400">Nombre de archivo original: Pimienta negra.jpeg</span>
                                                </div>
                                                <input type="text" value={editImages.pimienta} onChange={(e) => handleImageChange('pimienta', e.target.value)} placeholder="URL de la imagen" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('pimienta', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>

                                            {/* VEHICULO MIEL */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Vehículo: Miel de Abejas</span>
                                                    <span className="text-[10px] text-stone-400">Miel pura de abejas</span>
                                                </div>
                                                <input type="text" value={editImages.miel} onChange={(e) => handleImageChange('miel', e.target.value)} placeholder="URL de la miel" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('miel', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>

                                            {/* PASTILLAS PROTOTIPO */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Foto del Prototipo de Pastillas</span>
                                                    <span className="text-[10px] text-stone-400">Nombre original: image_76b339.jpg</span>
                                                </div>
                                                <input type="text" value={editImages.pastillas} onChange={(e) => handleImageChange('pastillas', e.target.value)} placeholder="URL de la imagen" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('pastillas', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>

                                            {/* TU FOTO DE PERFIL */}
                                            <div className="bg-[#fcfcfd] p-4 rounded-2xl border border-stone-200 space-y-3 sm:col-span-2">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-stone-700">Tu Foto de Perfil (Antony Racines)</span>
                                                    <span className="text-[10px] text-stone-400">Se mostrará en el perfil de contacto del proyecto</span>
                                                </div>
                                                <input type="text" value={editImages.antony} onChange={(e) => handleImageChange('antony', e.target.value)} placeholder="URL de la imagen o Base64" className="w-full px-3 py-2 text-xs border rounded-lg" />
                                                <input type="file" accept="image/*" onChange={(e) => handleFileUpload('antony', e)} className="text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-earth-100 file:text-earth-800 cursor-pointer" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* SECCIÓN CARGADORES DE TEXTOS */}
                                    <div className="space-y-4 pt-4 border-t border-stone-100">
                                        <h4 className="font-extrabold text-sm uppercase text-earth-750 tracking-wider bg-earth-100 p-3 rounded-xl">✍ Personalizar Copys y Textos de Venta</h4>
                                        
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Título de Atracción (Hero)</label>
                                                <input type="text" name="heroTitle" value={editForm.heroTitle} onChange={handleInputChange} className="w-full px-3 py-2.5 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-earth-500" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Subtítulo Descriptivo (Hero)</label>
                                                <textarea name="heroSubtitle" value={editForm.heroSubtitle} onChange={handleInputChange} rows="3" className="w-full px-3 py-2.5 border rounded-xl resize-none text-sm outline-none focus:ring-2 focus:ring-earth-500"></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Título de la Propuesta de Valor</label>
                                                <input type="text" name="aboutTitle" value={editForm.aboutTitle} onChange={handleInputChange} className="w-full px-3 py-2.5 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-earth-500" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Texto Detallado de Propuesta</label>
                                                <textarea name="aboutText" value={editForm.aboutText} onChange={handleInputChange} rows="4" className="w-full px-3 py-2.5 border rounded-xl resize-none text-sm outline-none focus:ring-2 focus:ring-earth-500"></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Título de Sección Fórmulas</label>
                                                <input type="text" name="productsTitle" value={editForm.productsTitle} onChange={handleInputChange} className="w-full px-3 py-2.5 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-earth-500" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Texto Sección Fórmulas</label>
                                                <textarea name="productsText" value={editForm.productsText} onChange={handleInputChange} rows="4" className="w-full px-3 py-2.5 border rounded-xl resize-none text-sm outline-none focus:ring-2 focus:ring-earth-500"></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Título sobre Ti</label>
                                                <input type="text" name="bioTitle" value={editForm.bioTitle} onChange={handleInputChange} className="w-full px-3 py-2.5 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-earth-500" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Biografía del Emprendedor</label>
                                                <textarea name="bioText" value={editForm.bioText} onChange={handleInputChange} rows="4" className="w-full px-3 py-2.5 border rounded-xl resize-none text-sm outline-none focus:ring-2 focus:ring-earth-500"></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    {/* BOTONES DE ACCIÓN */}
                                    <div className="sticky bottom-0 bg-white pt-4 border-t border-stone-100 flex flex-wrap justify-between gap-3 pb-2 z-10">
                                        <button 
                                            type="button" 
                                            onClick={exportHTML}
                                            className="px-6 py-2.5 rounded-xl font-bold text-earth-700 bg-earth-50 border border-earth-100 hover:bg-earth-100 flex items-center gap-2 text-xs"
                                        >
                                            📥 Exportar index.html Definitivo
                                        </button>
                                        
                                        <div className="flex gap-3">
                                            <button type="button" onClick={() => setShowEditModal(false)} className="px-6 py-2.5 rounded-xl font-bold text-stone-600 hover:bg-stone-100 text-xs">Cancelar</button>
                                            <button type="submit" className="px-6 py-2.5 rounded-xl font-bold text-white bg-green-600 hover:bg-green-700 flex items-center gap-2 text-xs shadow-md">
                                                ✓ Guardar Cambios
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
