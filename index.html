<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etnobotánica - Biotecnología Vascular de Precisión</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7f9',
                            100: '#dbeef2',
                            200: '#bce0e7',
                            500: '#1e6b7b', 
                            600: '#165360',
                            700: '#0f2e3d', // Azul oscuro del logo
                            800: '#0a1f2a',
                            900: '#07161e',
                            dark: '#0a151b',
                        },
                        botanical: {
                            50: '#f1f9f4',
                            100: '#e1f2e7',
                            500: '#3e9c64', // Verde hojas del logo
                            600: '#2e7d4d', 
                            800: '#1c4e2f',
                        },
                        earth: {
                            50: '#faf6f3',
                            100: '#f3e8df',
                            500: '#8c583c', // Tono tierra/arcilla
                            600: '#75472e',
                            700: '#5c3821',
                        },
                        accent: {
                            100: '#e0f2f1',
                            500: '#0f968c',
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html { scroll-behavior: smooth; }
        .glow-flow { background: linear-gradient(135deg, rgba(15,46,61,0.04) 0%, rgba(46,125,77,0.03) 50%, rgba(140,88,60,0.04) 100%); }
        .enhanced-logo { filter: contrast(1.05) saturate(1.02) brightness(1.01); }
    </style>
</head>
<body class="bg-[#f4f8f6] text-stone-800 font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DEFAULT_CONTENT = {
            heroTitle: "Biotecnología de Precisión para el Retorno Vascular",
            heroSubtitle: "Transformamos la riqueza fitoquímica del departamento del Magdalena en soluciones biológicas de alta absorción para aliviar la insuficiencia venosa y regenerar tu vitalidad celular.",
            aboutTitle: "El Poder de la Etnobotánica Científica",
            aboutText: "Diseñamos fitoterapéuticos de precisión enfocados en el bienestar endotelial. Validamos la sinergia de especies botánicas nativas para el tratamiento complementario del dolor periférico, reduciendo la dependencia de químicos sintéticos a través de un formato galénico tradicional de píldoras de miel.",
            productsTitle: "Nuestras Fórmulas de Precisión",
            productsText: "Estandarizamos la dosificación artesanal en formatos altamente asimilables. Nuestras píldoras y esferas de miel de 500mg a 1000mg preservan los aceites esenciales sin necesidad de excipientes sintéticos.",
            bioTitle: "Innovación y Tradición de la mano de Antony",
            bioText: "Soy Antony Racines Tapia, apasionado por la bioprospección y la soberanía sanitaria. Mi propósito es validar científicamente la riqueza vegetal de nuestra región para desarrollar alternativas terapéuticas de máxima pureza, creando alianzas con la academia y el Herbario UTMC de la Universidad del Magdalena."
        };

        // Enlaces por defecto seguros para evitar errores 404 iniciales
        const DEFAULT_IMAGES = {
            logo: "https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&q=80&w=200",
            hero: "https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&q=80&w=800",
            prontoalivio: "https://images.unsplash.com/photo-1596733430284-f74370c81d33?auto=format&fit=crop&q=80&w=400",
            curcuma: "https://images.unsplash.com/photo-1615486171448-472e38ee1a2c?auto=format&fit=crop&q=80&w=400",
            ortiga: "https://images.unsplash.com/photo-1628102375494-1a134d193d19?auto=format&fit=crop&q=80&w=400",
            pimienta: "https://images.unsplash.com/photo-1599940824399-b87987ceb72a?auto=format&fit=crop&q=80&w=400",
            miel: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?auto=format&fit=crop&q=80&w=400",
            pastillas: "https://images.unsplash.com/photo-1611078810793-181512b9211c?auto=format&fit=crop&q=80&w=800",
            antony: "" 
        };

        function App() {
            const [content, setContent] = useState(() => {
                const saved = localStorage.getItem('etno_data_content');
                return saved ? JSON.parse(saved) : DEFAULT_CONTENT;
            });

            const [images, setImages] = useState(() => {
                const saved = localStorage.getItem('etno_images_data');
                return saved ? JSON.parse(saved) : DEFAULT_IMAGES;
            });

            const [gasUrl, setGasUrl] = useState(() => {
                return localStorage.getItem('etnobotanica_gas_url') || 'https://script.google.com/macros/s/AKfycbxunYDD0fHKch1eIiA0DCQ4wBOWmBUgsuzKSP0FyHWsTmwLt9f53XmoHIqfMeV-jo4/exec';
            });

            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [passcode, setPasscode] = useState('');
            const [editForm, setEditForm] = useState(content);
            const [editImages, setEditImages] = useState(images);
            const [toastMessage, setToastMessage] = useState('');
            const [activeFormula, setActiveFormula] = useState('prbv');
            const [isSubmitting, setIsSubmitting] = useState(false);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 4000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passcode === 'ETNO2026') {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setPasscode('');
                    showToast('¡Modo Editor Activado!');
                } else {
                    showToast('Código de acceso incorrecto.');
                }
            };

            // Función vital reparada: Actualiza los textos mientras escribes
            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setEditForm(prev => ({ ...prev, [name]: value }));
            };

            // Convertidor mágico de Google Drive
            const convertDriveLink = (url) => {
                if (!url) return '';
                // Extrae el ID de un link de compartir de Drive
                const regExp = /\/file\/d\/([a-zA-Z0-9_-]+)/;
                const match = url.match(regExp);
                if (match && match[1]) {
                    // Lo convierte en un link directo de imagen
                    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
                }
                return url;
            };

            const handleImageChange = (key, e) => {
                const rawUrl = e.target.value;
                const finalUrl = convertDriveLink(rawUrl);
                setEditImages(prev => ({ ...prev, [key]: finalUrl }));
            };

            const handleSaveAll = (e) => {
                e.preventDefault();
                setContent(editForm);
                setImages(editImages);
                localStorage.setItem('etno_data_content', JSON.stringify(editForm));
                localStorage.setItem('etno_images_data', JSON.stringify(editImages));
                localStorage.setItem('etnobotanica_gas_url', gasUrl);
                setShowEditModal(false);
                showToast('¡Cambios guardados localmente!');
            };

            const exportUpdatedHTML = () => {
                const currentHTML = document.documentElement.outerHTML;
                
                let updatedHTML = currentHTML;
                const findRegex = /const DEFAULT_CONTENT = \{[\s\S]*?\};/;
                updatedHTML = updatedHTML.replace(findRegex, `const DEFAULT_CONTENT = ${JSON.stringify(editForm, null, 4)};`);
                
                const findImagesRegex = /const DEFAULT_IMAGES = \{[\s\S]*?\};/;
                updatedHTML = updatedHTML.replace(findImagesRegex, `const DEFAULT_IMAGES = ${JSON.stringify(editImages, null, 4)};`);
                
                const findGASRegex = /return localStorage\.getItem\('etnobotanica_gas_url'\) \|\| '[^']*';/;
                updatedHTML = updatedHTML.replace(findGASRegex, `return localStorage.getItem('etnobotanica_gas_url') || ${JSON.stringify(gasUrl)};`);

                const blob = new Blob([`<!DOCTYPE html>\n<html lang="es">\n` + updatedHTML + `\n</html>`], { type: 'text/html' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'index.html';
                link.click();
                showToast('¡Archivo descargado! Súbelo a tu GitHub.');
            };

            const handleContactSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const formData = {
                    nombre: e.target.nombre.value,
                    correo: e.target.correo.value,
                    interes: e.target.interes.value,
                    mensaje: e.target.mensaje.value,
                    fecha: new Date().toLocaleString()
                };

                if (gasUrl) {
                    try {
                        await fetch(gasUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(formData)
                        });
                        showToast('¡Éxito! Registro guardado. Revisa tu correo de confirmación.');
                        e.target.reset();
                    } catch (err) {
                        showToast('Enviado. Verifica tu Google Script.');
                    }
                } else {
                    showToast('¡Guardado localmente! Falta configurar el Google Script.');
                    e.target.reset();
                }
                setIsSubmitting(false);
            };

            const plantProfiles = [
                {
                    key: "prontoalivio",
                    name: "Prontoalivio (Sanalotodo)",
                    scientific: "Lippia alba",
                    class: "Magnoliopsida",
                    desc: "Arbusto aromático medicinal valorado por sus propiedades antiinflamatorias, digestivas y sedantes.",
                    benefits: [
                        "Modulador único del tono vascular.",
                        "Efecto analgésico y venotónico periférico.",
                        "Acción antiespasmódica y sedante natural."
                    ],
                    location: "Laderas del departamento del Magdalena.",
                    highlight: "Altísima concentración de aceites esenciales puros.",
                    image: images.prontoalivio
                },
                {
                    key: "curcuma",
                    name: "Cúrcuma Dorada",
                    scientific: "Cúrcuma longa",
                    class: "Liliopsida",
                    desc: "Planta herbácea perenne con rizomas de un color naranja profundo, clave para desinflamar el endotelio vascular.",
                    benefits: [
                        "Antiinflamatorio natural comparable al ibuprofeno.",
                        "Protector metabólico que reduce el colesterol.",
                        "En investigación para salud cognitiva y memoria."
                    ],
                    location: "Suelos tropicales de la Zona Bananera.",
                    highlight: "El pilar antioxidante del sistema circulatorio.",
                    image: images.curcuma
                },
                {
                    key: "ortiga",
                    name: "Ortiga Mayor",
                    scientific: "Urtica dioica",
                    class: "Magnoliopsida",
                    desc: "Esencial para la reconstrucción de tejidos y fortalecimiento endotelial gracias a sus minerales.",
                    benefits: [
                        "Remineralización y firmeza a las paredes venosas.",
                        "Acción antiinflamatoria sistémica para dolor articular.",
                        "Actúa como antihistamínico natural."
                    ],
                    location: "Zonas medias de la Sierra Nevada de Santa Marta.",
                    highlight: "Soporte estructural indispensable para evitar hinchazón.",
                    image: images.ortiga
                },
                {
                    key: "pimienta",
                    name: "Pimienta Negra",
                    scientific: "Piper nigrum",
                    class: "Magnoliopsida",
                    desc: "La llave biológica: planta trepadora esencial para bio-potenciar la asimilación de la fórmula.",
                    benefits: [
                        "Inhibe enzimas hepáticas para evitar la degradación.",
                        "Aumenta la biodisponibilidad de curcumina en un 2,000%.",
                        "Estimulante digestivo y neuroprotector."
                    ],
                    location: "Valles cálidos y húmedos del Magdalena.",
                    highlight: "Multiplicador biológico de absorción celular.",
                    image: images.pimienta
                }
            ];

            return (
                <div className="min-h-screen glow-flow flex flex-col justify-between">
                    {/* ENCABEZADO */}
                    <header className="fixed top-0 w-full bg-[#f4f8f6]/90 backdrop-blur-md z-40 border-b border-brand-100/50 shadow-sm">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="relative w-12 h-12 bg-white rounded-xl shadow-md border border-brand-100 flex items-center justify-center overflow-hidden p-0.5">
                                    <img src={images.logo} alt="Logo" className="w-full h-full object-contain enhanced-logo" />
                                </div>
                                <span className="text-xl font-serif font-black text-brand-700 tracking-tight">etnobotánica</span>
                            </div>
                            <nav className="hidden md:flex gap-8 font-semibold text-stone-600">
                                <a href="#proposito" className="hover:text-botanical-600">Innovación</a>
                                <a href="#plantas" className="hover:text-botanical-600">Ingredientes</a>
                                <a href="#productos" className="hover:text-botanical-600">Fórmulas</a>
                                <a href="#contacto" className="hover:text-botanical-600">Aliados</a>
                            </nav>
                            {isAdmin ? (
                                <button onClick={() => setShowEditModal(true)} className="bg-brand-700 text-white px-5 py-2.5 rounded-full font-bold text-sm shadow-lg">🛠 Panel de Edición</button>
                            ) : (
                                <a href="#contacto" className="hidden sm:inline-block bg-brand-700 text-white px-6 py-2.5 rounded-full font-bold text-sm shadow-md">Hacerse Socio</a>
                            )}
                        </div>
                    </header>

                    {/* HERO */}
                    <section className="pt-36 pb-20 px-6 relative">
                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-botanical-100/30 rounded-full blur-[120px] -z-10 translate-x-1/3 -translate-y-1/3"></div>
                        <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
                            <div className="space-y-6 relative z-10">
                                <div className="inline-flex items-center gap-2 px-4 py-2 bg-botanical-100 text-botanical-800 font-bold rounded-full text-xs uppercase tracking-wider">
                                    <span className="w-2 h-2 rounded-full bg-botanical-500 animate-pulse"></span>
                                    Sabiduría de la Sierra Nevada
                                </div>
                                <h1 className="text-4xl md:text-5xl lg:text-6xl font-serif font-black leading-tight text-brand-700">{content.heroTitle}</h1>
                                <p className="text-lg text-stone-600 leading-relaxed">{content.heroSubtitle}</p>
                                <div className="pt-4 flex gap-4">
                                    <a href="#productos" className="bg-gradient-to-r from-brand-700 to-botanical-600 text-white px-8 py-4 rounded-full font-bold shadow-xl">Explorar Productos ➔</a>
                                </div>
                            </div>
                            <div className="relative">
                                <div className="relative rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white aspect-[4/3]">
                                    <img src={images.hero} alt="Matera" className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                    <div className="absolute bottom-6 left-6 right-6 text-white flex items-center gap-4">
                                        <div className="w-14 h-14 rounded-xl bg-white/95 p-1 shadow-lg">
                                            <img src={images.logo} alt="Logo" className="w-full h-full object-contain enhanced-logo" />
                                        </div>
                                        <div>
                                            <p className="text-xs uppercase font-bold text-brand-200">Concepto de Marca</p>
                                            <h3 className="font-serif text-lg font-bold">Magdalena, Colombia</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* PROPOSITO */}
                    <section id="proposito" className="py-24 px-6 bg-white border-y border-brand-100/30">
                        <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-12">
                            <div className="space-y-6">
                                <h2 className="text-3xl md:text-4xl font-serif font-bold text-brand-700 leading-tight">{content.aboutTitle}</h2>
                                <p className="text-stone-600 leading-relaxed text-base">{content.aboutText}</p>
                            </div>
                            <div className="grid sm:grid-cols-2 gap-6">
                                <div className="p-8 rounded-3xl bg-brand-50 border border-brand-100"><h3 className="font-bold text-brand-700">💎 Sinergia Real</h3></div>
                                <div className="p-8 rounded-3xl bg-botanical-50 border border-botanical-100"><h3 className="font-bold text-botanical-800">🔬 2000% Absorción</h3></div>
                                <div className="p-8 rounded-3xl bg-earth-50 border border-earth-100 sm:col-span-2"><h3 className="font-bold text-earth-700">🍯 Miel a Punto de Hebra</h3><p className="text-sm text-stone-600 mt-2">Conservante biológico sin aditivos sintéticos.</p></div>
                            </div>
                        </div>
                    </section>

                    {/* INGREDIENTES */}
                    <section id="plantas" className="py-24 px-6 bg-[#f4f8f6]">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-center max-w-2xl mx-auto mb-16">
                                <h2 className="text-4xl font-serif font-bold text-brand-700 mb-4">Materia Prima Regional</h2>
                                <p className="text-stone-600">Cosechados en entornos limpios del Magdalena y Sierra Nevada.</p>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {plantProfiles.map((plant, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl overflow-hidden shadow-lg border border-stone-100 flex flex-col">
                                        <div className="h-48 overflow-hidden bg-stone-100">
                                            <img src={plant.image} alt={plant.name} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="p-6 flex-1 flex flex-col">
                                            <h3 className="text-lg font-bold text-brand-700 mb-1">{plant.name}</h3>
                                            <p className="text-[10px] text-botanical-600 uppercase font-bold mb-3">{plant.scientific}</p>
                                            <p className="text-xs text-stone-600 mb-4 flex-1">{plant.desc}</p>
                                            <div className="bg-earth-50 p-2 rounded-lg text-[10px] font-bold text-earth-700 text-center">★ {plant.highlight}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* PRODUCTOS Y EMPAQUE */}
                    <section id="productos" className="py-24 px-6 bg-brand-dark text-white relative">
                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-brand-900 to-transparent opacity-50"></div>
                        <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-16 relative z-10">
                            <div>
                                <h2 className="text-4xl font-serif font-bold mb-6">{content.productsTitle}</h2>
                                <p className="text-stone-300 mb-8">{content.productsText}</p>
                                
                                <div className="space-y-4">
                                    <div className="bg-brand-800 p-6 rounded-2xl border border-brand-700">
                                        <h4 className="text-xl font-bold text-botanical-400 mb-2">Protocolo PRB-V</h4>
                                        <p className="text-sm text-stone-400">Ortiga (40%) • Prontoalivio (30%) • Cúrcuma (25%) • Pimienta (5%)</p>
                                    </div>
                                    <div className="bg-brand-800 p-6 rounded-2xl border border-brand-700">
                                        <h4 className="text-xl font-bold text-earth-400 mb-2">Receta 1: Equilibrio</h4>
                                        <p className="text-sm text-stone-400">Cúrcuma (40%) • Pimienta Negra (10%) • Miel Clarificada (50%)</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="space-y-8">
                                <div className="rounded-3xl overflow-hidden shadow-2xl border-4 border-stone-800 aspect-[4/3] bg-stone-900">
                                    <img src={images.pastillas} alt="Prototipo de Pastillas" className="w-full h-full object-cover" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACTO */}
                    <section id="contacto" className="py-24 px-6 bg-white">
                        <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-16">
                            <div className="bg-[#f6faf8] p-8 md:p-12 rounded-[2.5rem] border border-botanical-100">
                                <div className="flex items-center gap-6 mb-8">
                                    <div className="w-24 h-24 rounded-full border-4 border-white shadow-lg overflow-hidden bg-brand-100">
                                        {images.antony ? <img src={images.antony} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-stone-200"></div>}
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-serif font-black text-brand-700">Antony Racines Tapia</h3>
                                        <p className="text-botanical-600 font-bold text-sm uppercase">Fundador</p>
                                    </div>
                                </div>
                                <h4 className="text-xl font-bold text-brand-700 mb-4">{content.bioTitle}</h4>
                                <p className="text-stone-600 leading-relaxed text-sm mb-6">{content.bioText}</p>
                                <a href="mailto:a4t4n4@gmail.com" className="font-bold text-brand-700 hover:text-botanical-600">✉ a4t4n4@gmail.com</a>
                            </div>

                            <div className="bg-white p-8 md:p-12 rounded-[2.5rem] border border-stone-100 shadow-xl">
                                <h3 className="text-3xl font-serif font-black text-brand-700 mb-2">¿Deseas ser un Aliado?</h3>
                                <p className="text-stone-500 text-sm mb-8">Buscamos inversionistas y distribuidores. Déjanos tus datos.</p>
                                <form onSubmit={handleContactSubmit} className="space-y-6">
                                    <input name="nombre" type="text" required placeholder="Nombre Completo" className="w-full px-4 py-3 rounded-xl border bg-stone-50 focus:ring-2 focus:ring-brand-700 outline-none text-sm" />
                                    <input name="correo" type="email" required placeholder="Correo de Contacto" className="w-full px-4 py-3 rounded-xl border bg-stone-50 focus:ring-2 focus:ring-brand-700 outline-none text-sm" />
                                    <select name="interes" className="w-full px-4 py-3 rounded-xl border bg-stone-50 outline-none text-sm">
                                        <option>Socio Inversionista</option><option>Distribución</option><option>Investigación</option>
                                    </select>
                                    <textarea name="mensaje" rows="3" required placeholder="Tu propuesta..." className="w-full px-4 py-3 rounded-xl border bg-stone-50 outline-none text-sm"></textarea>
                                    <button type="submit" disabled={isSubmitting} className="w-full bg-brand-700 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-botanical-600 transition-all">
                                        {isSubmitting ? 'Procesando...' : 'Enviar Solicitud'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="bg-brand-dark text-stone-400 py-8 border-t border-stone-900 text-center">
                        <p className="text-xs">© 2026 Antony Racines Tapia. <button onClick={() => setShowLoginModal(true)} className="ml-2 hover:text-white">🔒 Admin</button></p>
                    </footer>

                    {toastMessage && <div className="fixed bottom-6 right-6 bg-brand-700 text-white px-6 py-4 rounded-xl shadow-2xl z-50 text-sm font-bold">{toastMessage}</div>}

                    {/* MODAL ACCESO */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
                                <h3 className="text-2xl font-serif font-black text-brand-700 mb-4">Acceso Privado</h3>
                                <form onSubmit={handleLogin}>
                                    <input type="password" value={passcode} onChange={(e) => setPasscode(e.target.value)} placeholder="Código" className="w-full px-4 py-3 rounded-xl border bg-stone-50 mb-4 outline-none" />
                                    <button type="submit" className="w-full bg-brand-700 text-white font-bold py-3 rounded-xl">Ingresar</button>
                                </form>
                                <button onClick={() => setShowLoginModal(false)} className="mt-4 text-sm text-stone-500 w-full text-center">Cancelar</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE EDICIÓN (SOLO LINKS PARA IMÁGENES) */}
                    {showEditModal && isAdmin && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl p-8 max-w-3xl w-full max-h-[90vh] overflow-y-auto">
                                <h3 className="text-2xl font-serif font-bold text-brand-700 mb-6">🛠 Panel de Configuración</h3>
                                
                                <form onSubmit={handleSaveAll} className="space-y-6">
                                    <div className="space-y-4">
                                        <h4 className="font-bold text-sm bg-earth-100 text-earth-800 p-2 rounded">🖼 1. Cargar Imágenes (Vía Google Drive)</h4>
                                        <p className="text-xs text-stone-500">Pega aquí los enlaces de compartir de tu Google Drive. El sistema los convertirá automáticamente para que sean visibles en la web.</p>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            {Object.keys(editImages).map(key => (
                                                <div key={key}>
                                                    <label className="block text-xs font-bold capitalize mb-1 text-stone-600">{key}</label>
                                                    <input type="text" value={editImages[key]} onChange={(e) => handleImageChange(key, e)} className="w-full px-3 py-2 border rounded-lg text-xs" placeholder={`Link de Google Drive para ${key}`} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-4 pt-4 border-t">
                                        <h4 className="font-bold text-sm bg-brand-100 text-brand-800 p-2 rounded">✍ 2. Editar Textos</h4>
                                        <div><label className="text-xs font-bold text-stone-500">Título Principal</label><input type="text" name="heroTitle" value={editForm.heroTitle} onChange={handleInputChange} className="w-full px-3 py-2 border rounded text-sm" /></div>
                                        <div><label className="text-xs font-bold text-stone-500">Subtítulo</label><textarea name="heroSubtitle" value={editForm.heroSubtitle} onChange={handleInputChange} rows="2" className="w-full px-3 py-2 border rounded text-sm"></textarea></div>
                                        <div><label className="text-xs font-bold text-stone-500">Título de Propuesta</label><input type="text" name="aboutTitle" value={editForm.aboutTitle} onChange={handleInputChange} className="w-full px-3 py-2 border rounded text-sm" /></div>
                                        <div><label className="text-xs font-bold text-stone-500">Texto Propuesta</label><textarea name="aboutText" value={editForm.aboutText} onChange={handleInputChange} rows="3" className="w-full px-3 py-2 border rounded text-sm"></textarea></div>
                                        <div><label className="text-xs font-bold text-stone-500">Título Biografía</label><input type="text" name="bioTitle" value={editForm.bioTitle} onChange={handleInputChange} className="w-full px-3 py-2 border rounded text-sm" /></div>
                                        <div><label className="text-xs font-bold text-stone-500">Texto Biografía</label><textarea name="bioText" value={editForm.bioText} onChange={handleInputChange} rows="3" className="w-full px-3 py-2 border rounded text-sm"></textarea></div>
                                    </div>

                                    <div className="flex flex-wrap justify-between gap-3 pt-6 border-t mt-6">
                                        <button type="button" onClick={exportUpdatedHTML} className="px-6 py-2 bg-botanical-100 text-botanical-800 font-bold rounded-lg text-sm">📥 Descargar index.html (Para GitHub)</button>
                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => setShowEditModal(false)} className="px-4 py-2 bg-stone-100 font-bold rounded-lg text-sm">Cerrar</button>
                                            <button type="submit" className="px-6 py-2 bg-brand-700 text-white font-bold rounded-lg text-sm">✓ Aplicar Cambios Visuales</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
